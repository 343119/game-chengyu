// 游戏核心逻辑（保留本地存档+答错限制）
let save = localStorage.getItem("idiomGameSave");
let gameData = save ? JSON.parse(save) : {currentIndex:0, wrongCount:0};
let {currentIndex, wrongCount} = gameData;
const maxWrong = 3;

const imgDom = document.getElementById('img');
const numDom = document.getElementById('num');
const wrongDom = document.getElementById('wrong');
const ansBoxDom = document.getElementById('ansBox');

// 保存进度到本地
function saveProgress() {
  localStorage.setItem("idiomGameSave", JSON.stringify({
    currentIndex: currentIndex,
    wrongCount: wrongCount
  }));
}

// 渲染当前题目
function renderQuestion() {
  if (currentIndex >= questions.length) {
    alert("🎉 恭喜你！100道题全部答完了！");
    currentIndex = 0;
    wrongCount = 0;
    saveProgress();
  }

  const question = questions[currentIndex];
  numDom.innerText = `第${currentIndex + 1}题/共${questions.length}题`;
  wrongDom.innerText = wrongCount;
  imgDom.src = question.img;
  
  // 清空选项并重新生成
  ansBoxDom.innerHTML = "";
  // 打乱选项顺序
  const shuffledOptions = [...question.options].sort(() => Math.random() - 0.5);
  
  shuffledOptions.forEach(option => {
    const btn = document.createElement('button');
    btn.className = "btn";
    btn.innerText = option;
    btn.onclick = () => checkAnswer(option);
    ansBoxDom.appendChild(btn);
  });
}

// 检查答案
function checkAnswer(selectedAnswer) {
  const correctAnswer = questions[currentIndex].answer;
  
  if (selectedAnswer === correctAnswer) {
    // 答对了
    currentIndex++;
    wrongCount = 0;
  } else {
    // 答错了
    wrongCount++;
    if (wrongCount >= maxWrong) {
      alert(`❌ 答错${maxWrong}次了，跳过这题`);
      currentIndex++;
      wrongCount = 0;
    } else {
      alert(`❌ 答错了，还有${maxWrong - wrongCount}次机会`);
    }
  }
  
  saveProgress();
  renderQuestion();
}

// 页面加载时渲染第一题
window.onload = renderQuestion;
</script>
